<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Inter', sans-serif;
}

body {
    display: flex;
    height: 100vh;
}

/* LEFT SIDE */
.left {
    flex: 1;
    background: linear-gradient(135deg, #4f46e5, #7c3aed);
    color: white;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 60px;
}

.left h1 {
    font-size: 40px;
    font-weight: 600;
}

.left p {
    margin-top: 10px;
    opacity: 0.8;
}

/* RIGHT SIDE */
.right {
    flex: 1;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #f9fafb;
}

.card {
    width: 350px;
}

h2 {
    margin-bottom: 20px;
    font-weight: 600;
}

/* INPUT */
.input-group {
    margin-bottom: 18px;
}

.input-group input {
    width: 100%;
    padding: 12px;
    border-radius: 8px;
    border: 1px solid #ddd;
    outline: none;
    transition: 0.2s;
}

.input-group input:focus {
    border-color: #4f46e5;
    box-shadow: 0 0 0 2px rgba(79,70,229,0.1);
}

/* ERROR */
.error {
    font-size: 12px;
    color: #e11d48;
    margin-top: 4px;
}

/* BUTTON */
button {
    width: 100%;
    padding: 12px;
    background: #4f46e5;
    color: white;
    border: none;
    border-radius: 8px;
    font-weight: 500;
    cursor: pointer;
    transition: 0.2s;
}

button:hover {
    background: #4338ca;
}

/* GENERAL ERROR */
.general-error {
    color: #e11d48;
    font-size: 13px;
    margin-bottom: 10px;
}

/* SUCCESS */
.success {
    color: #16a34a;
}

/* MOBILE */
@media(max-width: 768px){
    .left {
        display: none;
    }
    .right {
        flex: 1;
    }
}
</style>
</head>

<body>

<div class="left">
    <h1>Welcome Back 👋</h1>
    <p>Login to manage your account and continue your journey.</p>
</div>

<div class="right">
    <div class="card">

        <h2>Sign in</h2>

        <div id="generalError" class="general-error"></div>

        <form id="loginForm">

            <div class="input-group">
                <input type="text" name="username" placeholder="Username">
                <div class="error" id="error-username"></div>
            </div>

            <div class="input-group">
                <input type="password" name="password" placeholder="Password">
                <div class="error" id="error-password"></div>
            </div>

            <button type="submit">Continue</button>

        </form>
    </div>
</div>

<script>
const form = document.getElementById("loginForm");

form.addEventListener("submit", async (e) => {
    e.preventDefault();
    clearErrors();

    const data = Object.fromEntries(new FormData(form));

    let hasError = false;

    if (!data.username) {
        showError("username", "Username is required");
        hasError = true;
    }

    if (!data.password) {
        showError("password", "Password is required");
        hasError = true;
    }

    if (hasError) return;

    try {
        const res = await fetch("http://127.0.0.1:8000/Account/Account/LOgin", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify(data)
        });

        const result = await res.json();

        if (res.ok) {
            localStorage.setItem("token", result.token);

            showSuccess("Login successful");

            setTimeout(()=>{
                // window.location.href="dashboard.html"
            },1000);

        } else {
            if (result.non_field_errors) {
                showGeneral(result.non_field_errors[0]);
            } else {
                for (let key in result) {
                    showError(key, result[key][0]);
                }
            }
        }

    } catch {
        showGeneral("Server error");
    }
});

function showError(field, msg) {
    document.getElementById("error-" + field).innerText = msg;
}

function showGeneral(msg) {
    const el = document.getElementById("generalError");
    el.innerText = msg;
}

function showSuccess(msg) {
    const el = document.getElementById("generalError");
    el.classList.add("success");
    el.innerText = msg;
}

function clearErrors() {
    document.querySelectorAll(".error").forEach(e => e.innerText = "");
    const el = document.getElementById("generalError");
    el.innerText = "";
    el.classList.remove("success");
}
</script>

</body>
</html>
